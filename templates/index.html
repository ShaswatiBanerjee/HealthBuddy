{% extends "layout.html" %}
{% block content %}

<style>

/* MAIN GREEN BLOCK */
.main-box{
    background: linear-gradient(135deg,#00c853,#00796b);
    color:white;
    border-radius:25px;
    margin-top:40px;
    padding:100px 30px 80px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* TITLE */
.hero-title{
    font-size:60px;
    font-weight:900;
    letter-spacing:2px;
}

/* SUBTITLE */
.hero-sub{
    font-size:20px;
    opacity:0.9;
    margin-top:10px;
}

/* CIRCLES */
.circle-container{
    margin-top:50px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.circle{
    width:120px;
    height:120px;
    background:white;
    color:#00695c;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    text-align:center;
    padding:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.circle:hover{
    transform:scale(1.1);
}

/* CTA BUTTON */
.start-btn{
    padding:14px 35px;
    border-radius:50px;
    background:white;
    color:#00695c;
    font-weight:600;
    font-size:17px;
    text-decoration:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.start-btn:hover{
    transform:translateY(-3px);
    background:#e0f2f1;
} 

</style>


<div class="container">

    <div class="main-box">

        <h1 class="hero-title">HealthBuddy</h1>
        <p class="hero-sub">
            Smart Health Monitoring for your Physical & Mental Wellness 🤍
        </p>

        <!-- MODULE CIRCLES -->
        <div class="circle-container">

            <div class="circle">💪🏻<br>BMI</div>
            <div class="circle">🩸<br>BLood Pressure</div>
            <div class="circle">😊😐🙁<br>Mood Tracker</div>
            <div class="circle">💧<br>Water Intake</div>
            <div class="circle">💉<br>Blood Sugar</div>

        </div>

        <!-- BOTTOM CTA BUTTON -->
      <div class="mt-5">
      <a href="/mood" class="start-btn">Start Your Health Journey →</a>
     </div>

    </div>

</div>

{% endblock %}
